<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语翻译检测小程序</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }
            
            .mobile-padding {
                padding: 1rem !important;
            }
            
            .mobile-text-xl {
                font-size: 1.25rem !important;
            }
            
            .mobile-text-2xl {
                font-size: 1.5rem !important;
            }
            
            .mobile-text-3xl {
                font-size: 1.75rem !important;
            }
            
            .mobile-btn {
                padding: 0.875rem 1.5rem !important;
                font-size: 1rem !important;
                min-height: 48px;
            }
            
            .mobile-input {
                padding: 0.875rem 1rem !important;
                font-size: 1rem !important;
            }
        }
        
        .correct-answer {
            animation: correctPulse 0.5s ease-in-out;
        }
        
        .wrong-answer {
            animation: wrongShake 0.5s ease-in-out;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-hover {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }
        
        .btn-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }
        
        .btn-hover:active {
            transform: translateY(0);
        }
        
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
        }
        
        /* 防止移动端双击缩放 */
        button, input {
            touch-action: manipulation;
        }
        
        /* 优雅的卡片样式 */
        .elegant-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            border: 1px solid #e5e7eb;
        }
        
        .section-title {
            font-family: 'Noto Serif SC', serif;
            color: #1f2937;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        
        .accent-blue {
            background: #3b82f6;
            color: white;
        }
        
        .accent-blue:hover {
            background: #2563eb;
        }
        
        .accent-green {
            background: #10b981;
            color: white;
        }
        
        .accent-green:hover {
            background: #059669;
        }
        
        .accent-purple {
            background: #8b5cf6;
            color: white;
        }
        
        .accent-purple:hover {
            background: #7c3aed;
        }
        
        .accent-amber {
            background: #f59e0b;
            color: white;
        }
        
        .accent-amber:hover {
            background: #d97706;
        }
        
        .stat-number {
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.01em;
            font-family: 'Inter', sans-serif;
        }
        
        .question-display {
            background: #fafafa;
            border: 1.5px solid #d1d5db;
            transition: all 0.2s ease;
            font-family: 'Noto Serif SC', serif;
        }
        
        .question-display:hover {
            border-color: #9ca3af;
            background: #f5f5f5;
        }
        
        /* 固定高度的提示区域 */
        .hint-container {
            min-height: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        
        .hint-container.show {
            max-height: 300px;
            opacity: 1;
        }
        
        /* 例句区域 */
        .example-sentence {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left: 4px solid #f59e0b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
        }
        
        .example-label {
            font-size: 0.75rem;
            color: #92400e;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .example-text {
            font-size: 1.05rem;
            color: #78350f;
            line-height: 1.6;
        }
        
        .example-blank {
            display: inline-block;
            min-width: 80px;
            padding: 0 8px;
            border-bottom: 2px dashed #f59e0b;
            color: #dc2626;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body class="p-3 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- 头部 -->
        <header class="text-center mb-6 md:mb-10">
            <h1 class="text-2xl md:text-4xl font-bold text-gray-800 mb-2 section-title">
                📚 英语翻译检测系统
            </h1>
            <p class="text-gray-600 text-sm md:text-base font-medium">词组与词汇拼写练习平台</p>
        </header>

        <!-- 模式选择 -->
        <div class="elegant-card p-5 md:p-7 mb-5 md:mb-8 fade-in mobile-padding">
            <div class="flex flex-col md:flex-row gap-3 md:gap-4 justify-center items-center">
                <button onclick="switchMode('phrase')" id="phraseBtn" 
                    class="px-6 py-3.5 md:px-8 md:py-4 accent-blue rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover w-full mobile-btn">
                    📝 词组检测
                </button>
                <button onclick="switchMode('vocabulary')" id="vocabularyBtn" 
                    class="px-6 py-3.5 md:px-8 md:py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover w-full mobile-btn border border-gray-200">
                    📖 词汇检测
                </button>
            </div>
            
            <!-- 分组选择区域 -->
            <div id="groupSelection" class="hidden mt-6 pt-6 border-t border-slate-200">
                <div class="text-center mb-4">
                    <div class="text-sm md:text-base text-slate-700 font-medium mb-3">📋 选择题目分组（每组15题）</div>
                    <div id="groupButtons" class="flex flex-wrap gap-2 justify-center">
                        <!-- 分组按钮将通过JavaScript动态生成 -->
                    </div>
                    <div class="mt-3 text-xs text-slate-500">
                        当前选择：<span id="currentGroup" class="font-semibold text-indigo-600">全部题目</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="elegant-card p-5 md:p-7 mb-5 md:mb-8 fade-in mobile-padding">
            <div class="grid grid-cols-3 md:grid-cols-5 gap-4 md:gap-6">
                <div class="text-center">
                    <div class="text-2xl md:text-3xl font-bold text-blue-600 stat-number" id="totalCount">0</div>
                    <div class="text-slate-600 text-xs md:text-sm mt-1.5 font-medium">总题数</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl md:text-3xl font-bold text-indigo-600 stat-number" id="currentQuestionNum">0</div>
                    <div class="text-slate-600 text-xs md:text-sm mt-1.5 font-medium">当前题号</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl md:text-3xl font-bold text-emerald-600 stat-number" id="correctCount">0</div>
                    <div class="text-slate-600 text-xs md:text-sm mt-1.5 font-medium">正确</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl md:text-3xl font-bold text-rose-600 stat-number" id="wrongCount">0</div>
                    <div class="text-slate-600 text-xs md:text-sm mt-1.5 font-medium">错误</div>
                </div>
                <div class="text-center col-span-3 md:col-span-1">
                    <div class="text-2xl md:text-3xl font-bold text-purple-600 stat-number" id="accuracyRate">0%</div>
                    <div class="text-slate-600 text-xs md:text-sm mt-1.5 font-medium">正确率</div>
                </div>
            </div>
            
            <!-- 进度条 -->
            <div class="mt-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <button onclick="clearProgress()" class="px-4 py-2.5 md:px-5 md:py-3 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition-all text-xs md:text-sm w-full md:w-auto mobile-btn border border-gray-200">
                    🗑️ 清除进度
                </button>
                <div class="flex-1 w-full">
                    <div class="flex justify-between text-xs md:text-sm text-gray-600 mb-2.5 font-medium">
                        <span>练习进度</span>
                        <span id="progressText">0/0</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 md:h-3 overflow-hidden">
                        <div id="progressBar" class="progress-bar bg-blue-600 h-2.5 md:h-3 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主练习区域 -->
        <div class="elegant-card p-6 md:p-10 fade-in mobile-padding">
            <!-- 题目显示区域 -->
            <div class="mb-8 md:mb-10">
                <div class="text-center mb-5 md:mb-7">
                    <div class="text-xs md:text-sm text-gray-500 mb-3 font-medium">请根据中文含义拼写英文</div>
                    <div id="chineseDisplay" class="text-xl md:text-3xl font-bold text-gray-800 py-8 md:py-10 px-4 md:px-6 question-display rounded-lg mobile-text-3xl">
                        点击开始按钮开始练习
                    </div>
                    
                    <!-- 智能提示区域 -->
                    <div id="hintArea" class="hint-container mt-4">
                        <div class="p-4 bg-indigo-50 border-l-4 border-indigo-500 rounded-lg">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="text-xs md:text-sm text-indigo-900 font-medium mb-2">💡 一级提示：</div>
                                    <div id="hintContent" class="text-base md:text-lg text-indigo-800"></div>
                                    
                                    <!-- 二级提示按钮 -->
                                    <button onclick="showLevel2Hint()" id="level2HintBtn" class="mt-3 px-4 py-2 accent-purple hover:bg-purple-700 rounded-lg text-xs md:text-sm font-medium transition-colors">
                                        🔍 显示更详细提示（二级）
                                    </button>
                                    
                                    <!-- 二级提示内容 -->
                                    <div id="level2HintContent" class="hidden mt-3 pt-3 border-t border-indigo-200">
                                        <div class="text-xs md:text-sm text-indigo-900 font-medium mb-2">🔍 二级提示：</div>
                                        <div id="level2HintText" class="text-base md:text-lg text-indigo-900"></div>
                                    </div>
                                </div>
                                <button onclick="hideHint()" class="ml-2 md:ml-4 text-indigo-400 hover:text-indigo-600 p-2">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 多答案提示 -->
                <div id="multiAnswerHint" class="hidden mb-3 md:mb-4 p-3 md:p-4 bg-amber-50 border-l-4 border-amber-500 rounded-lg">
                    <div class="flex items-start">
                        <svg class="w-4 h-4 md:w-5 md:h-5 text-amber-600 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                        </svg>
                        <div class="text-xs md:text-sm text-amber-800">
                            <strong>提示：</strong>此中文含义对应多个英文单词，请全部拼写（用逗号或空格分隔）
                        </div>
                    </div>
                </div>
                
                <!-- 例句区域 -->
                <div id="exampleArea" class="hidden">
                    <div class="example-sentence">
                        <div class="example-label">📖 例句：</div>
                        <div id="exampleText" class="example-text"></div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="mb-6 md:mb-8">
                <label class="block text-slate-700 font-semibold mb-3 text-base md:text-lg">
                    请输入英文：
                </label>
                <input 
                    type="text" 
                    id="userInput" 
                    class="w-full px-5 py-4 md:px-6 md:py-5 border-2 border-slate-300 rounded-xl focus:outline-none input-focus text-lg md:text-xl transition-all mobile-input bg-white"
                    placeholder="在此输入英文..."
                    disabled
                >
                <div class="mt-3 text-xs md:text-sm text-slate-500 font-medium">
                    💡 提示：词组检测可忽略空格和大小写；词汇检测为单个单词拼写
                </div>
            </div>

            <!-- 反馈区域 -->
            <div id="feedbackArea" class="hidden mb-6 md:mb-8 p-5 md:p-7 rounded-xl fade-in">
                <div id="feedbackContent"></div>
            </div>

            <!-- 按钮区域 -->
            <div class="flex flex-col gap-3 md:gap-4">
                <button onclick="startPractice()" id="startBtn" 
                    class="px-6 py-3.5 md:px-8 md:py-4 accent-green rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover mobile-btn">
                    ▶️ 开始练习
                </button>
                
                <button onclick="showHint()" id="hintBtn" 
                    class="hidden px-6 py-3.5 md:px-6 md:py-4 accent-purple rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover mobile-btn">
                    💡 显示提示
                </button>
                
                <button onclick="checkAnswer()" id="checkBtn" 
                    class="hidden px-6 py-3.5 md:px-8 md:py-4 accent-blue rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover mobile-btn">
                    ✓ 检查答案
                </button>
                
                <button onclick="markAsForgotten()" id="forgottenBtn" 
                    class="hidden px-6 py-3.5 md:px-8 md:py-4 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover mobile-btn">
                    😕 遗忘了（显示答案）
                </button>
                
                <button onclick="nextQuestion()" id="nextBtn" 
                    class="hidden px-6 py-3.5 md:px-8 md:py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover mobile-btn">
                    ➡️ 下一题
                </button>
                
                <button onclick="showAnswer()" id="showAnswerBtn" 
                    class="hidden px-6 py-3.5 md:px-8 md:py-4 accent-amber rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover mobile-btn">
                    👀 查看答案
                </button>
            </div>
        </div>

        <!-- 完成提示 -->
        <div id="completionModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div class="elegant-card p-7 md:p-9 max-w-md w-full text-center mobile-padding">
                <div class="text-6xl md:text-7xl mb-4">🎉</div>
                <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mb-6 section-title">练习完成！</h2>
                <div class="space-y-3 md:space-y-4 mb-6 md:mb-8">
                    <div class="flex justify-between items-center px-4 py-3 bg-gray-50 rounded-lg border border-gray-200">
                        <span class="text-gray-600 font-medium">总题数</span>
                        <span class="font-bold text-blue-600 text-xl stat-number" id="finalTotal">0</span>
                    </div>
                    <div class="flex justify-between items-center px-4 py-3 bg-emerald-50 rounded-lg border border-emerald-200">
                        <span class="text-gray-600 font-medium">正确</span>
                        <span class="font-bold text-emerald-600 text-xl stat-number" id="finalCorrect">0</span>
                    </div>
                    <div class="flex justify-between items-center px-4 py-3 bg-rose-50 rounded-lg border border-rose-200">
                        <span class="text-gray-600 font-medium">错误</span>
                        <span class="font-bold text-rose-600 text-xl stat-number" id="finalWrong">0</span>
                    </div>
                    <div class="flex justify-between items-center px-4 py-3 bg-purple-50 rounded-lg border border-purple-200">
                        <span class="text-gray-600 font-medium">正确率</span>
                        <span class="font-bold text-purple-600 text-xl stat-number" id="finalAccuracy">0%</span>
                    </div>
                </div>
                <button onclick="restartPractice()" 
                    class="px-6 py-4 md:px-8 md:py-5 accent-blue rounded-lg font-semibold text-base md:text-lg shadow-sm btn-hover w-full mobile-btn">
                    🔄 重新开始
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 数据定义 ====================
        
        // 词组数据（来自翻译练习 - 完整版130题）
        const phraseData = [
            { chinese: "利用，占便宜", english: "take advantage of", example: "We should ______ this opportunity to improve ourselves." },
            { chinese: "引起，导致", english: "give rise to", example: "This issue may ______ more controversy." },
            { chinese: "应对，处理", english: "cope with", example: "We need to learn how to ______ stress." },
            { chinese: "归因于", english: "be attributed to", example: "Success can ______ his hard work and persistence." },
            { chinese: "致力于，承诺", english: "be committed to", example: "The company is ______ providing high-quality services." },
            { chinese: "有助于，有利于", english: "be conducive to", example: "A good environment is ______ learning." },
            { chinese: "由...组成", english: "be composed of", example: "This team ______ five members." },
            { chinese: "致力于，专用于", english: "be dedicated to", example: "This book is ______ my parents." },
            { chinese: "缺乏", english: "be deficient in", example: "This food is ______ vitamin C." },
            { chinese: "有权，有资格", english: "be entitled to", example: "Every citizen is ______ education." },
            { chinese: "易于，倾向于", english: "be prone to", example: "Elderly people are ______ this disease." },
            { chinese: "在...方面，就...而言", english: "in terms of", example: "______ quality, this product is excellent." },
            { chinese: "在...中起关键作用", english: "play a crucial role in", example: "Education ______ social development." },
            { chinese: "有影响，起作用", english: "make a difference", example: "Everyone's efforts can ______." },
            { chinese: "必然，注定", english: "be bound to", example: "Difficulties ______ appear." },
            { chinese: "对...表示怀疑", english: "cast doubt on", example: "This discovery ______ the previous theory." },
            { chinese: "意识到，知道", english: "be aware of", example: "You should ______ the potential risks." },
            { chinese: "可能", english: "be likely to", example: "He ______ be late." },
            { chinese: "对...产生影响", english: "have an impact on", example: "Policy changes will ______ the economy." },
            { chinese: "配备有", english: "be equipped with", example: "This car is ______ advanced safety systems." },
            { chinese: "促进，推进", english: "promote", example: "The government aims to ______ economic growth." },
            { chinese: "消除，排除", english: "eliminate", example: "We must ______ all potential risks." },
            { chinese: "强调", english: "emphasize", example: "Teachers should ______ the importance of practice." },
            { chinese: "实施，执行", english: "implement", example: "The company plans to ______ new policies." },
            { chinese: "维持，保持", english: "maintain", example: "It's important to ______ a healthy lifestyle." },
            { chinese: "获得，获取", english: "acquire", example: "Students need to ______ practical skills." },
            { chinese: "面临，面对", english: "face", example: "We must ______ the challenges bravely." },
            { chinese: "解决", english: "resolve", example: "They worked together to ______ the conflict." },
            { chinese: "提高，增强", english: "enhance", example: "Technology can ______ our productivity." },
            { chinese: "减少，降低", english: "reduce", example: "We should ______ waste and pollution." },
            { chinese: "以…自豪", english: "take pride in", example: "She ______ her achievements." },
            { chinese: "私下, 秘密地", english: "in private", example: "They discussed the matter ______." },
            { chinese: "公开地", english: "in public", example: "He spoke ______ about his opinions." },
            { chinese: "禁止, 阻止", english: "prohibit…from", example: "The law ______ smoking in restaurants." },
            { chinese: "故意", english: "on purpose", example: "Did you do that ______?" },
            { chinese: "在某种科目或学科上合格", english: "be qualified in", example: "He is ______ mathematics." },
            { chinese: "在某种职业上合格", english: "be qualified for", example: "She is ______ the position." },
            { chinese: "不可能的", english: "out of the question", example: "Going abroad is ______ for now." },
            { chinese: "所谈及的", english: "in question", example: "The matter ______ is very serious." },
            { chinese: "毫无疑问", english: "without question", example: "He is the best candidate ______." },

            isChecked = false;
            
            document.getElementById('chineseDisplay').textContent = '点击开始按钮开始练习';
            document.getElementById('userInput').value = '';
            document.getElementById('userInput').disabled = true;
            document.getElementById('feedbackArea').classList.add('hidden');
            document.getElementById('multiAnswerHint').classList.add('hidden');
            document.getElementById('hintArea').classList.add('hidden'); // 隐藏提示区域
            
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('hintBtn').classList.add('hidden'); // 隐藏提示按钮
            document.getElementById('checkBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('showAnswerBtn').classList.add('hidden');
        }

        // ==================== 分组功能 ====================
        
        // 生成分组按钮
        function generateGroupButtons() {
            const data = getCurrentData();
            const totalGroups = Math.ceil(data.length / GROUP_SIZE);
            const groupSelection = document.getElementById('groupSelection');
            const groupButtons = document.getElementById('groupButtons');
            
            // 显示分组选择区域
            groupSelection.classList.remove('hidden');
            
            // 清空现有按钮
            groupButtons.innerHTML = '';
            
            // 添加“全部题目”按钮
            const allBtn = createGroupButton('全部', 'all', selectedGroup === 'all');
            groupButtons.appendChild(allBtn);
            
            // 添加分组按钮
            for (let i = 0; i < totalGroups; i++) {
                const startNum = i * GROUP_SIZE + 1;
                const endNum = Math.min((i + 1) * GROUP_SIZE, data.length);
                const btn = createGroupButton(`第${i + 1}组 (${startNum}-${endNum})`, i, selectedGroup === i);
                groupButtons.appendChild(btn);
            }
        }
        
        // 创建分组按钮
        function createGroupButton(label, groupIndex, isActive) {
            const btn = document.createElement('button');
            btn.className = `px-3 py-2 md:px-4 md:py-2 rounded-lg text-xs md:text-sm font-medium transition-colors mobile-btn ${
                isActive 
                    ? 'bg-blue-600 text-white' 
                    : 'bg-gray-200 text-gray-700 hover:bg-gray-300'
            }`;
            btn.textContent = label;
            btn.onclick = () => selectGroup(groupIndex);
            return btn;
        }
        
        // 选择分组
        function selectGroup(groupIndex) {
            selectedGroup = groupIndex;
            
            // 更新当前分组显示
            const currentGroupText = document.getElementById('currentGroup');
            if (groupIndex === 'all') {
                currentGroupText.textContent = '全部题目';
            } else {
                const startNum = groupIndex * GROUP_SIZE + 1;
                const data = getCurrentData();
                const endNum = Math.min((groupIndex + 1) * GROUP_SIZE, data.length);
                currentGroupText.textContent = `第${groupIndex + 1}组 (${startNum}-${endNum}题)`;
            }
            
            // 重新生成分组按钮以更新样式
            generateGroupButtons();
            
            // 重置练习状态
            if (isStarted) {
                resetState();
            }
            
            // 保存分组选择
            localStorage.setItem(`translation_${currentMode}_group`, selectedGroup);
        }
        
        // 获取当前分组的题目数据
        function getGroupedData() {
            const allData = currentMode === 'phrase' ? phraseData : vocabularyData;
            
            if (selectedGroup === 'all') {
                return allData;
            }
            
            const startIndex = selectedGroup * GROUP_SIZE;
            const endIndex = Math.min(startIndex + GROUP_SIZE, allData.length);
            return allData.slice(startIndex, endIndex);
        }

        // 开始练习
        function startPractice() {
            isStarted = true;
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('hintBtn').classList.remove('hidden'); // 显示提示按钮
            document.getElementById('checkBtn').classList.remove('hidden');
            document.getElementById('forgottenBtn').classList.remove('hidden'); // 显示遗忘按钮
            document.getElementById('userInput').disabled = false;
            document.getElementById('userInput').focus();
            
            showCurrentQuestion();
            updateStats();
        }

        // 显示当前题目
        function showCurrentQuestion() {
            const data = getCurrentData();
            
            if (currentIndex >= data.length) {
                showCompletion();
                return;
            }
            
            const item = data[currentIndex];
            document.getElementById('chineseDisplay').textContent = item.chinese;
            document.getElementById('userInput').value = '';
            document.getElementById('feedbackArea').classList.add('hidden');
            document.getElementById('hintArea').classList.remove('show'); // 隐藏提示区域
            document.getElementById('level2HintContent').classList.add('hidden'); // 隐藏二级提示
            document.getElementById('level2HintBtn').classList.remove('hidden'); // 显示二级提示按钮
            document.getElementById('forgottenBtn').classList.remove('hidden'); // 显示遗忘按钮
            isChecked = false;
            
            // 检查是否是多答案题目
            const multiAnswerHint = document.getElementById('multiAnswerHint');
            if (currentMode === 'vocabulary' && item.english.length > 1) {
                multiAnswerHint.classList.remove('hidden');
            } else {
                multiAnswerHint.classList.add('hidden');
            }
            
            // 显示例句
            const exampleArea = document.getElementById('exampleArea');
            const exampleText = document.getElementById('exampleText');
            if (item.example) {
                // 将 ______ 替换为带样式的中文占位符
                const formattedExample = item.example.replace(/_{3,}/g, '<span class="example-blank">(此处填空)</span>');
                exampleText.innerHTML = formattedExample;
                exampleArea.classList.remove('hidden');
            } else {
                // 如果没有例句，自动生成一个简单的示例
                const englishWord = currentMode === 'phrase' ? item.english : item.english[0];
                const autoExample = `Please use "${englishWord}" in a sentence.`;
                exampleText.textContent = autoExample;
                exampleArea.classList.remove('hidden');
            }
            
            updateStats(); // 更新题号
            updateProgress();
        }

        // 获取当前数据
        function getCurrentData() {
            return getGroupedData();
        }

        // 检查答案
        function checkAnswer() {
            if (!isStarted || isChecked) return;
            
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) {
                alert('请先输入答案！');
                return;
            }
            
            const data = getCurrentData();
            const currentItem = data[currentIndex];
            let isCorrect = false;
            
            if (currentMode === 'phrase') {
                // 词组检测：忽略空格和大小写
                const normalizedUser = userInput.toLowerCase().replace(/\s+/g, '');
                const normalizedAnswer = currentItem.english.toLowerCase().replace(/\s+/g, '');
                isCorrect = normalizedUser === normalizedAnswer;
            } else {
                // 词汇检测：支持多个答案
                const userAnswers = userInput.split(/[,，\s]+/).map(a => a.toLowerCase().trim()).filter(a => a);
                const correctAnswers = currentItem.english.map(a => a.toLowerCase());
                
                // 检查用户输入的答案是否包含所有正确答案
                isCorrect = correctAnswers.every(answer => 
                    userAnswers.some(userAns => userAns === answer)
                ) && userAnswers.length === correctAnswers.length;
            }
            
            isChecked = true;
            
            // 显示反馈
            showFeedback(isCorrect, currentItem);
            
            // 更新统计
            if (isCorrect) {
                correctCount++;
            } else {
                wrongCount++;
            }
            
            updateStats();
            
            // 切换按钮
            document.getElementById('checkBtn').classList.add('hidden');
            document.getElementById('forgottenBtn').classList.add('hidden');
            document.getElementById('hintBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
            document.getElementById('showAnswerBtn').classList.remove('hidden');
        }

        // 显示反馈
        function showFeedback(isCorrect, item) {
            const feedbackArea = document.getElementById('feedbackArea');
            const feedbackContent = document.getElementById('feedbackContent');
            
            feedbackArea.classList.remove('hidden', 'bg-emerald-50', 'bg-rose-50', 'correct-answer', 'wrong-answer');
            
            if (isCorrect) {
                feedbackArea.classList.add('bg-emerald-50', 'correct-answer');
                feedbackArea.style.border = '2px solid #10b981';
                feedbackContent.innerHTML = `
                    <div class="flex items-center">
                        <svg class="w-8 h-8 text-emerald-600 mr-3" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        <div>
                            <div class="text-lg font-semibold text-emerald-800">回答正确！🎉</div>
                            ${currentMode === 'phrase' ? 
                                `<div class="text-emerald-700 mt-1">正确答案：<strong>${item.english}</strong></div>` :
                                `<div class="text-emerald-700 mt-1">正确答案：<strong>${item.english.join(', ')}</strong></div>`
                            }
                        </div>
                    </div>
                `;
            } else {
                feedbackArea.classList.add('bg-rose-50', 'wrong-answer');
                feedbackArea.style.border = '2px solid #f43f5e';
                feedbackContent.innerHTML = `
                    <div class="flex items-center">
                        <svg class="w-8 h-8 text-rose-600 mr-3" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                        </svg>
                        <div>
                            <div class="text-lg font-semibold text-rose-800">回答错误，请继续努力！💪</div>
                            ${currentMode === 'phrase' ? 
                                `<div class="text-rose-700 mt-1">正确答案：<strong>${item.english}</strong></div>` :
                                `<div class="text-rose-700 mt-1">正确答案：<strong>${item.english.join(', ')}</strong></div>`
                            }
                        </div>
                    </div>
                `;
            }
        }

        // 标记为遗忘（直接显示答案并计为错误）
        function markAsForgotten() {
            if (!isStarted || isChecked) return;
            
            const data = getCurrentData();
            const currentItem = data[currentIndex];
            
            if (!currentItem) return;
            
            // 增加错误计数
            wrongCount++;
            isChecked = true;
            
            // 显示反馈
            showFeedback(false, currentItem);
            
            // 更新统计
            updateStats();
            saveProgress();
            
            // 切换按钮
            document.getElementById('checkBtn').classList.add('hidden');
            document.getElementById('forgottenBtn').classList.add('hidden');
            document.getElementById('hintBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        // 查看答案
        function showAnswer() {
            const data = getCurrentData();
            const currentItem = data[currentIndex];
            
            const feedbackArea = document.getElementById('feedbackArea');
            const feedbackContent = document.getElementById('feedbackContent');
            
            feedbackArea.classList.remove('hidden', 'bg-emerald-50', 'bg-rose-50');
            feedbackArea.classList.add('bg-blue-50');
            feedbackArea.style.border = '2px solid #3b82f6';
            
            feedbackContent.innerHTML = `
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-blue-600 mr-3" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    <div>
                        <div class="text-lg font-semibold text-blue-800">查看答案</div>
                        ${currentMode === 'phrase' ? 
                            `<div class="text-blue-700 mt-1">正确答案：<strong>${currentItem.english}</strong></div>` :
                            `<div class="text-blue-700 mt-1">正确答案：<strong>${currentItem.english.join(', ')}</strong></div>`
                        }
                    </div>
                </div>
            `;
            
            document.getElementById('checkBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        // 下一题
        function nextQuestion() {
            currentIndex++;
            saveProgress(); // 保存进度
            showCurrentQuestion();
            
            document.getElementById('checkBtn').classList.remove('hidden');
            document.getElementById('hintBtn').classList.remove('hidden');
            document.getElementById('forgottenBtn').classList.remove('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('showAnswerBtn').classList.add('hidden');
            document.getElementById('userInput').focus();
        }

        // ==================== 智能提示功能 ====================
        
        // 显示提示
        function showHint() {
            const data = getCurrentData();
            const currentItem = data[currentIndex];
            
            if (!currentItem) return;
            
            let hintText = '';
            
            if (currentMode === 'phrase') {
                // 词组模式：显示首字母和长度
                const answer = currentItem.english;
                const firstLetter = answer.charAt(0).toUpperCase();
                const length = answer.length;
                const wordCount = answer.split(' ').length;
                
                hintText = `
                    <div class="space-y-2">
                        <div><strong>首字母：</strong>${firstLetter}</div>
                        <div><strong>总长度：</strong>${length} 个字符（含空格）</div>
                        <div><strong>单词数：</strong>${wordCount} 个单词</div>
                    </div>
                `;
            } else {
                // 词汇模式：显示每个答案的提示
                const answers = currentItem.english;
                hintText = '<div class="space-y-3">';
                
                answers.forEach((answer, index) => {
                    const firstLetter = answer.charAt(0).toUpperCase();
                    const length = answer.length;
                    const maskedAnswer = maskWord(answer);
                    
                    hintText += `
                        <div class="p-3 bg-white rounded-lg border border-indigo-200">
                            <div class="text-sm text-indigo-600 mb-1">答案 ${index + 1}：</div>
                            <div class="flex items-center space-x-4">
                                <span class="font-bold text-indigo-900">${maskedAnswer}</span>
                                <span class="text-sm text-indigo-500">(${length}个字母，首字母: ${firstLetter})</span>
                            </div>
                        </div>
                    `;
                });
                
                hintText += '</div>';
            }
            
            document.getElementById('hintContent').innerHTML = hintText;
            document.getElementById('hintArea').classList.add('show');
        }
        
        // 隐藏提示
        function hideHint() {
            document.getElementById('hintArea').classList.remove('show');
            document.getElementById('level2HintContent').classList.add('hidden');
            document.getElementById('level2HintBtn').classList.remove('hidden');
        }
        
        // 显示二级提示
        function showLevel2Hint() {
            const data = getCurrentData();
            const currentItem = data[currentIndex];
            
            if (!currentItem) return;
            
            let level2Text = '';
            
            if (currentMode === 'phrase') {
                // 词组模式：显示更多字母
                const answer = currentItem.english;
                const revealedAnswer = revealMoreLetters(answer, 0.5); // 显示50%的字母
                
                level2Text = `
                    <div class="space-y-2">
                        <div><strong>部分字母提示：</strong></div>
                        <div class="text-xl font-bold text-indigo-900 bg-white p-3 rounded-lg">${revealedAnswer}</div>
                        <div class="text-xs text-indigo-600 mt-2">灰色下划线为需要填写的字母</div>
                    </div>
                `;
            } else {
                // 词汇模式：显示更多字母
                const answers = currentItem.english;
                level2Text = '<div class="space-y-3">';
                
                answers.forEach((answer, index) => {
                    const revealedAnswer = revealMoreLetters(answer, 0.6); // 显示60%的字母
                    
                    level2Text += `
                        <div class="p-3 bg-white rounded-lg border border-indigo-200">
                            <div class="text-sm text-indigo-600 mb-2">答案 ${index + 1}：</div>
                            <div class="text-lg font-bold text-indigo-900">${revealedAnswer}</div>
                        </div>
                    `;
                });
                
                level2Text += '</div>';
            }
            
            document.getElementById('level2HintText').innerHTML = level2Text;
            document.getElementById('level2HintContent').classList.remove('hidden');
            document.getElementById('level2HintBtn').classList.add('hidden');
        }
        
        // 显示更多字母（按比例）
        function revealMoreLetters(word, ratio) {
            const letters = word.split('');
            const length = letters.length;
            let result = '';
            
            for (let i = 0; i < length; i++) {
                if (letters[i] === ' ') {
                    result += ' ';
                } else {
                    // 根据比例决定是否显示该字母
                    // 首尾字母总是显示
                    if (i === 0 || i === length - 1 || Math.random() < ratio) {
                        result += letters[i];
                    } else {
                        result += '<span class="text-gray-400">_</span>';
                    }
                }
            }
            
            return result;
        }
        
        // 遮蔽单词（显示部分字母）
        function maskWord(word) {
            const letters = word.split('');
            const length = letters.length;
            
            if (length <= 3) {
                // 短单词：只显示首字母
                return letters[0] + '_'.repeat(length - 1);
            } else if (length <= 6) {
                // 中等单词：显示首尾字母
                return letters[0] + '_'.repeat(length - 2) + letters[length - 1];
            } else {
                // 长单词：显示首字母、中间一个字母和尾字母
                const midIndex = Math.floor(length / 2);
                let result = letters[0];
                for (let i = 1; i < length - 1; i++) {
                    result += (i === midIndex) ? letters[i] : '_';
                }
                result += letters[length - 1];
                return result;
            }
        }

        // 显示完成界面
        function showCompletion() {
            const total = correctCount + wrongCount;
            const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;
            
            document.getElementById('finalTotal').textContent = total;
            document.getElementById('finalCorrect').textContent = correctCount;
            document.getElementById('finalWrong').textContent = wrongCount;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            
            document.getElementById('completionModal').classList.remove('hidden');
        }

        // 重新开始
        function restartPractice() {
            document.getElementById('completionModal').classList.add('hidden');
            resetState();
            updateStats();
        }

        // 更新统计
        function updateStats() {
            const data = getCurrentData();
            const total = correctCount + wrongCount;
            const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;
            
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('currentQuestionNum').textContent = currentIndex + 1;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('wrongCount').textContent = wrongCount;
            document.getElementById('accuracyRate').textContent = accuracy + '%';
        }

        // 更新进度
        function updateProgress() {
            const data = getCurrentData();
            const progress = data.length > 0 ? ((currentIndex + 1) / data.length) * 100 : 0;
            
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${currentIndex + 1}/${data.length}`;
        }

        // 键盘事件监听
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (!isStarted) {
                    startPractice();
                } else if (!isChecked) {
                    checkAnswer();
                } else {
                    nextQuestion();
                }
            }
        });

        // 初始化
        loadProgress(); // 加载保存的进度
        updateStats();
    </script>
</body>
</html>
